<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Split Voyage Support</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 45%);
        color: var(--text);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }

      .topbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 20px;
      }

      .lang-select {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 14px;
        background: white;
        color: var(--text);
      }

      .hero {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 36px;
        line-height: 1.1;
      }

      .lead {
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.6;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 24px;
        margin-top: 16px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      }

      h2 {
        margin: 0 0 14px;
        font-size: 20px;
      }

      p,
      li {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      ul {
        margin: 0;
        padding-left: 20px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .mail {
        display: inline-block;
        margin-top: 8px;
        font-weight: 600;
      }

      .meta {
        display: grid;
        gap: 10px;
      }

      .meta div {
        padding: 12px 14px;
        border-radius: 14px;
        background: #f9fafb;
        border: 1px solid var(--line);
      }

      .footer {
        margin-top: 20px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="topbar">
        <select id="languageSelect" class="lang-select" aria-label="Language">
          <option value="en">English</option>
          <option value="ko">한국어</option>
          <option value="ja">日本語</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
        </select>
      </div>

      <section class="hero">
        <h1 data-i18n="title">Split Voyage Support</h1>
        <p class="lead" data-i18n="lead"></p>
      </section>

      <section class="card">
        <h2 data-i18n="contactTitle"></h2>
        <p data-i18n="contactBody"></p>
        <a class="mail" href="mailto:az0856@naver.com">az0856@naver.com</a>
      </section>

      <section class="card">
        <h2 data-i18n="includeTitle"></h2>
        <ul>
          <li data-i18n="include1"></li>
          <li data-i18n="include2"></li>
          <li data-i18n="include3"></li>
          <li data-i18n="include4"></li>
        </ul>
      </section>

      <section class="card">
        <h2 data-i18n="topicsTitle"></h2>
        <ul>
          <li data-i18n="topic1"></li>
          <li data-i18n="topic2"></li>
          <li data-i18n="topic3"></li>
          <li data-i18n="topic4"></li>
        </ul>
      </section>

      <section class="card">
        <h2 data-i18n="legalTitle"></h2>
        <div class="meta">
          <div>
            <span data-i18n="termsLabel"></span>
            <a href="https://sunghkim98.github.io/legal_site/terms/">
              https://sunghkim98.github.io/legal_site/terms/
            </a>
          </div>
          <div>
            <span data-i18n="privacyLabel"></span>
            <a href="https://sunghkim98.github.io/legal_site/privacy/">
              https://sunghkim98.github.io/legal_site/privacy/
            </a>
          </div>
        </div>
      </section>

      <p class="footer"><span data-i18n="updated"></span> 2026-03-12</p>
    </main>

        'zh-CN': {

            '这是 Split Voyage 的支持页面。如果你对登录、收据扫描、支出记录、账号删除或订阅有疑问，请通过电子邮件联系我们。',
          contactTitle: '联系我们',

          include1: '问题或咨询摘要',

          include4: '如果问题可见，请附上截图',
          topicsTitle: '常见支持主题',
          topic1: 'Apple 登录或登录回跳问题',

        'zh-TW': {
          title: 'Split Voyage 支援',
          lead:
            '這是 Split Voyage 的支援頁面。如果你對登入、收據掃描、支出紀錄、帳號刪除或訂閱有問題，請透過電子郵件與我們聯絡。',
          contactTitle: '聯絡我們',
          contactBody:
            '目前我們透過電子郵件提供支援。請附上 App 版本、裝置型號以及問題說明，以便我們更快協助你。',
          includeTitle: '建議在郵件中附上',
          include1: '問題或詢問摘要',
          include2: '裝置型號與 iOS 版本',
          include3: 'App 版本與建置號碼',
          include4: '若問題可在畫面中看到，請附上截圖',
          topicsTitle: '常見支援主題',
          topic1: 'Apple 登入或登入返回 App 的問題',
          topic2: '收據圖片上傳、檢視或刪除問題',
          topic3: '旅行支出紀錄與結算相關問題',
          topic4: '帳號刪除與資料刪除申請',
          legalTitle: '法律資訊',
          termsLabel: '服務條款：',
          privacyLabel: '隱私權政策：',
          updated: '最後更新：'
        }
      };

      function applyLanguage(lang) {
        const content = translations[lang] || translations.en;
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach((node) => {
          const key = node.getAttribute('data-i18n');
          if (content[key]) {
            node.textContent = content[key];
          }
        });
        localStorage.setItem('support-lang', lang);
      }

      const select = document.getElementById('languageSelect');
      const browserLang = navigator.language || 'en';
      const initialLang =
        localStorage.getItem('support-lang') ||
        (translations[browserLang] ? browserLang : browserLang.startsWith('ko')
          ? 'ko'
          : browserLang.startsWith('ja')
            ? 'ja'
            : browserLang.toLowerCase().startsWith('zh-tw')
              ? 'zh-TW'
              : browserLang.toLowerCase().startsWith('zh')
                ? 'zh-CN'
                : 'en');

      select.value = initialLang;
      applyLanguage(initialLang);
      select.addEventListener('change', (event) => applyLanguage(event.target.value));
    </script>
  </body>
</html>
